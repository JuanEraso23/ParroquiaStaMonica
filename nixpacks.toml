[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "nodejs_22", "npm"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install --include=dev"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan optimize:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"